name: Release (Telsi distribution)

on:
  push:
    tags:
      - "v*-telsi.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (e.g. v0.6.4-telsi.1). Must already exist on origin."
        required: true

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  cli-linux-x86_64:
    name: CLI tarball (linux x86_64)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev

      - uses: Swatinem/rust-cache@v2
        with:
          key: telsi-cli-x86_64-unknown-linux-gnu

      - name: Build openfang binary
        run: cargo build --release --target x86_64-unknown-linux-gnu --bin openfang

      - name: Package tarball
        run: |
          cd target/x86_64-unknown-linux-gnu/release
          tar czf ../../../openfang-x86_64-unknown-linux-gnu.tar.gz openfang
          cd ../../..
          sha256sum openfang-x86_64-unknown-linux-gnu.tar.gz \
            > openfang-x86_64-unknown-linux-gnu.tar.gz.sha256

      - name: Resolve release tag
        id: tag
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            echo "name=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: Telsi ${{ steps.tag.outputs.name }}
          body: |
            Telsi-branded distribution of OpenFang.

            This release is a narrow downstream of upstream
            [RightNow-AI/openfang](https://github.com/RightNow-AI/openfang) —
            the binary behavior is identical; only the customer-facing
            dashboard chrome (logo, favicon, title, manifest, literal
            product-name strings, theme colors) differs.

            See [NOTICE](https://github.com/telsi-ai/openfang/blob/main/NOTICE)
            for the full attribution and trademark posture.
          files: |
            openfang-x86_64-unknown-linux-gnu.tar.gz
            openfang-x86_64-unknown-linux-gnu.tar.gz.sha256
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
